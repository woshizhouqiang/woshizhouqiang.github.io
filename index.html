<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老婆专属转盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff6b6b, #feca57, #ff9ff3);
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .wheel-container {
            position: relative;
            width: 350px;
            height: 350px;
        }
        
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }
        
        .wheel-item {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: right bottom;
            left: 0;
            top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .wheel-item span {
            transform: rotate(45deg);
            margin-left: 20px;
            margin-top: -20px;
        }
        
        .item-1 { background: #ff6b6b; transform: rotate(0deg); }
        .item-2 { background: #4ecdc4; transform: rotate(90deg); }
        .item-3 { background: #45b7d1; transform: rotate(180deg); }
        .item-4 { background: #f9ca24; transform: rotate(270deg); }
        
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: #e74c3c;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
        }
        
        .btn {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 20px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #ff6b6b;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 20px;
            font-size: 24px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            min-height: 40px;
            text-align: center;
        }
        
        .total {
            margin-top: 10px;
            font-size: 16px;
            color: white;
            opacity: 0.9;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .win {
            animation: pulse 0.5s ease-in-out 3;
        }
    </style>
</head>
<body>
    <h1>🧧 老婆专属转盘</h1>
    
    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
            <div class="wheel-item item-1"><span>¥520</span></div>
            <div class="wheel-item item-2"><span>¥131.4</span></div>
            <div class="wheel-item item-3"><span>¥52</span></div>
            <div class="wheel-item item-4"><span>¥13.14</span></div>
        </div>
        <div class="center-circle">🎁</div>
    </div>
    
    <button class="btn" id="spinBtn" onclick="spin()">开始抽奖</button>
    
    <div class="result" id="result"></div>
    <div class="total" id="total">累计：¥0</div>

    <script>
        let total = 0;
        let isSpinning = false;
        let currentRotation = 0;
        
        const prizes = [
            { name: '一等奖', amount: 520, angle: 0 },
            { name: '二等奖', amount: 131.4, angle: 90 },
            { name: '三等奖', amount: 52, angle: 180 },
            { name: '幸运奖', amount: 13.14, angle: 270 }
        ];
        
        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('result').textContent = '抽奖中...';
            
            // 随机选择一个奖项
            const randomIndex = Math.floor(Math.random() * prizes.length);
            const prize = prizes[randomIndex];
            
            // 计算旋转角度：多转几圈 + 目标角度
            const spins = 5 + Math.floor(Math.random() * 3); // 5-7圈
            // 指针在顶部(0度)，要指向某个奖项，需要让该奖项转到顶部
            // 奖项当前角度 + 旋转角度 = 360的倍数(顶部)
            // 所以旋转角度 = 360 - 奖项角度
            const targetAngle = 360 - prize.angle;
            const finalRotation = currentRotation + spins * 360 + targetAngle;
            
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${finalRotation}deg)`;
            currentRotation = finalRotation;
            
            // 4秒后显示结果
            setTimeout(() => {
                total += prize.amount;
                document.getElementById('result').innerHTML = 
                    `🎉 ${prize.name}：<span style="font-size:32px;font-weight:bold;">¥${prize.amount}</span>`;
                document.getElementById('total').textContent = `累计：¥${total.toFixed(2)}`;
                document.getElementById('result').classList.add('win');
                
                setTimeout(() => {
                    document.getElementById('result').classList.remove('win');
                }, 1500);
                
                document.getElementById('spinBtn').disabled = false;
                isSpinning = false;
            }, 4000);
        }
    </script>
</body>
</html>
